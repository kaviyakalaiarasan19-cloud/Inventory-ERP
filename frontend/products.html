<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products | Inventory ERP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-boxes-stacked"></i>
<span>Inventory ERP</span>
</div>

<ul>

<li onclick="location.href='dashboard.html'">
<i class="fa-solid fa-house"></i>
Dashboard
</li>

<li class="active">
<i class="fa-solid fa-box"></i>
Products
</li>

<li onclick="location.href='suppliers.html'">
<i class="fa-solid fa-truck"></i>
Suppliers
</li>

<li onclick="location.href='inventory.html'">
<i class="fa-solid fa-warehouse"></i>
Inventory
</li>

<li onclick="location.href='reports.html'">
<i class="fa-solid fa-chart-line"></i>
Reports
</li>
<li style="margin-top:180px;" onclick="location.href='login.html'">
    <i class="fa-solid fa-right-from-bracket"></i>
    Logout
</li>

</ul>

</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<h2>Products</h2>

<div class="profile">

<input type="text" placeholder="Search Product..." class="search-box" onkeyup="searchProduct(this.value)">

<img src="images/kaviya.jpg" alt="Kaviya K">

</div>

</div>

<div class="table-box">

<div class="table-header">

<h3>Product Management</h3>
<button onclick="openModal()">+ Add Product</button>

</div>

    <table id="productTable">

        <tr>
            <th>ID</th>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

    </table>

</div>



</div>

</div>

<!-- Product Modal -->

<div id="productModal" class="modal">

<div class="modal-content">

<h2>Add Product</h2>

<input type="text" id="pname" placeholder="Product Name">

<input type="text" id="pcategory" placeholder="Category">

<input type="number" id="pprice" placeholder="Price">

<input type="number" id="pstock" placeholder="Stock">

<div class="modal-buttons">

<button onclick="saveProduct()">Save</button>

<button onclick="closeModal()">Cancel</button>

</div>

</div>

</div>

<script src="products.js"></script>

</body>

</html>
